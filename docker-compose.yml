# docker-compose.yml
# Lance PostgreSQL + Redis en local pour le développement
# Usage : docker compose up -d

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: visitbenin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     visitbenin
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       visitbenin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visitbenin -d visitbenin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: visitbenin_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:
